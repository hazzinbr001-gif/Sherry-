<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Sherry 💖</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }.card {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease-in-out;
}

h1 {
    color: white;
    font-size: 2em;
    margin-bottom: 10px;
}

p {
    color: white;
    font-size: 1.1em;
    line-height: 1.5;
}

.heart {
    font-size: 40px;
    animation: beat 1s infinite;
    margin-top: 15px;
}

@keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.floating {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
    opacity: 0.6;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 0.7; }
    50% { transform: translateY(-100px); opacity: 1; }
    100% { transform: translateY(0); opacity: 0.7; }
}

</style>
</head>
<body><div class="card">
    <h1>Hey Sherry 💖</h1>
    <p>
        Just a little reminder that you are amazing, strong, and deeply appreciated.
        No matter what you're going through right now, everything is going to be okay.
        Better days are coming, and you are never alone.
    </p>
    <p>
        Keep smiling, keep shining — the world is better with you in it.
    </p>
    <div class="heart">❤️</div>
</div><script>
    function createFloating() {
        const el = document.createElement('div');
        el.classList.add('floating');
        el.style.left = Math.random() * window.innerWidth + 'px';
        el.style.top = Math.random() * window.innerHeight + 'px';
        el.style.animationDuration = (3 + Math.random() * 5) + 's';
        document.body.appendChild(el);

        setTimeout(() => {
            el.remove();
        }, 6000);
    }

    setInterval(createFloating, 500);
</script></body>
</html>
